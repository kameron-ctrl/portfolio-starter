              - text: Last night, I gave a lightning talk at the inaugural
              - link "PyTorch" [ref=f1e32] [cursor=pointer]:
                - /url: https://www.linkedin.com/company/pytorch?trk=public_post_embed-text
              - text: "Santa Cruz Meetup, presenting my project, Green Guardian, to a room full of engineers, researchers, and Ph.D. students at UC Santa Cruz. Green Guardian started as a personal problem. I'm an amateur gardener, and a busy one. I'd come home after days away to spotted, yellowing leaves with no idea what was wrong. So I built an app: a fine-tuned ResNet-18 that classifies 38 plant disease categories from a single photo, with a"
              - link "Next.js" [ref=f1e33] [cursor=pointer]:
                - /url: https://www.linkedin.com/safety/go?url=http%3A%2F%2FNext.js%3Ftrk%3Dpublic_post_embed-text
              - text: "frontend and a FastAPI backend deployed on AWS. If there was one thing I wanted the room to walk away with, it's this: getting started with PyTorch is more approachable than it looks. Loading a pretrained model and fine-tuning it on your own data is a small amount of code. You don't need a research lab or years of experience to build something real; you just need a problem you actually care about. I'm at the"
              - link "University of California, Santa Cruz" [ref=f1e34] [cursor=pointer]:
