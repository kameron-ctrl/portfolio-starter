          - paragraph [ref=e132]: A full-stack web app that diagnoses plant diseases from leaf photographs using a custom-trained PyTorch (ResNet) model on the PlantVillage dataset. It classifies 15 conditions across tomato, potato, and bell pepper, returning real-time predictions with confidence scores and treatment recommendations. Deployed serverlessly on AWS Lambda + S3 + CloudFront with GitHub Actions CI/CD.
